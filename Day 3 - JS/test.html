<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        input[type="number"] {
            width: 100%;
            padding: 10px;
        }
        button {
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Calculator</h1>
    <form id="calculator-form">
        <label for="num1">Number 1:</label>
        <input type="number" id="num1" required>
        <br>
        <label for="num2">Number 2:</label>
        <input type="number" id="num2" required>
        <br>
        <button id="add-btn" onclick="calculate('add')">Add</button>
        <button id="subtract-btn" onclick="calculate('subtract')">Subtract</button>
        <button id="multiply-btn" onclick="calculate('multiply')">Multiply</button>
        <button id="divide-btn" onclick="calculate('divide')">Divide</button>
        <br>
        <p id="result"></p>
    </form>

    <script>
        function calculate(operation) {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById('result').textContent = 'Please enter valid numbers';
                return;
            }
            let result;
            switch (operation) {
                case 'add':
                    result = num1 + num2;
                    break;
                case 'subtract':
                    result = num1 - num2;
                    break;
                case 'multiply':
                    result = num1 * num2;
                    break;
                case 'divide':
                    if (num2 === 0) {
                        document.getElementById('result').textContent = 'Cannot divide by zero';
                        return;
                    }
                    result = num1 / num2;
                    break;
                default:
                    document.getElementById('result').textContent = 'Invalid operation';
                    return;
            }
            document.getElementById('result').textContent = `Result: ${result}`;
        }
    </script>
</body>
</html>
