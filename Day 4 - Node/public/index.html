<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First HTML5 Page - Registration</title>
</head>
<body>
    <h1> Registration </h1>
    <form>
        <table border="1">
            <tr>
                <td> First Name </td>
                <td> <input type="text" required minlength="5" maxlength="20" /></td>
            </tr>

            <tr>
                <td> DOB </td>
                <td> <input type="date" /> </td>
            </tr>

            <tr>
                <td> Fav Color </td>
                <td> <input type="color" /></td>
            </tr>
            <tr>
                <td> Age </td>
                <td> <input type="number" min="18" max="60"/></td>
            </tr>
            
            <tr>
                <td> Country </td>
                <td> <select>
                    <option> India </option>                    
                    <option> France </option>                    
                    <option> Spain </option>
                    <option> Netherlands </option>
                    <option> China </option>
                </select> </td>
            </tr>
            <tr>
                <td> <input type="submit" value="Register"/> </td>
                <td> <input type="reset" value="Reset"/> </td>
            </tr>

            <tr>
                <td> Experience </td>
                <td> <input type="range" min="1" max="10" /> </td>
            </tr>


        </table>
</form>


</body>
</html>
